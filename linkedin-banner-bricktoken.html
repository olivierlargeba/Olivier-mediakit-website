<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584">
<title>BrickToken — LinkedIn Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08090d;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .banner {
    width: 100vw;
    height: 396px;
    position: relative;
    overflow: hidden;
    background: #08090d;
  }

  /* Hero background — exact image from bricktoken.net */
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image: url('hero-bg.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  /* Light overlay — same as website, cubes visible through */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: rgba(8, 9, 13, 0.1);
  }

  /* Logo top-left — same position as website */
  .logo {
    position: absolute;
    top: 28px;
    left: 40px;
    z-index: 10;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #ef8239;
    letter-spacing: 0.3px;
  }

  /* Centered content — same as website hero */
  .content {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    text-align: center;
    padding: 0 60px;
  }

  /* Main slogan — Space Grotesk, same as bricktoken.net */
  .slogan {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  /* Sub-tagline — Inter light, same as website */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
    letter-spacing: 0.1px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="hero-bg"></div>
  <div class="overlay"></div>

  <a href="https://www.bricktoken.net" target="_blank" class="logo" style="text-decoration:none;">Bricktoken</a>

  <div class="content">
    <div class="slogan">
      L&#8217;avenir de l&#8217;immobilier est<br>
      sur la blockchain
    </div>
    <div class="subtitle">
      D&eacute;couvrez comment la blockchain d&eacute;mocratise l&#8217;investissement immobilier<br>
      gr&acirc;ce &agrave; la tokenisation
    </div>
  </div>
</div>
</body>
</html>
